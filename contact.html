<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cagawan.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand fw-bold" href="cagawan.html">Cagawan Carinderia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="cagawan.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="calculator.html">Calculator</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <section class="container py-5">
        <div class="card shadow p-4">

            <h1 class="text-center mb-4">Contact Us</h1>

            <form onsubmit="return validateForm()">

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" id="name" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Message</label>
                    <textarea id="message" class="form-control"></textarea>
                </div>

                <button class="btn btn-danger">Submit</button>

                <p id="formMessage" class="mt-3 fw-bold"></p>

            </form>
        </div>
    </section>

    <footer class="bg-dark text-white text-center p-3">
        © 2026 Cagawan Carinderia
    </footer>

    <script src="cagawan.js"></script>

</body>
